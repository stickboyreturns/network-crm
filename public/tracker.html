<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Network Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:15px}
.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:17px;font-weight:600}
.tabs{display:flex;gap:0;border-bottom:1px solid #e5e5e5;background:#fff;position:sticky;top:53px;z-index:99}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;color:#888;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.pane{display:none;padding:0 0 80px}
.pane.active{display:block}
.section-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.06em;padding:16px 16px 8px}
.card{background:#fff;border-radius:14px;padding:14px;margin:0 16px 8px;display:flex;gap:12px;align-items:flex-start}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-name{font-weight:600;font-size:14px;margin-bottom:2px}
.card-sub{font-size:12px;color:#888;margin-bottom:4px}
.card-note{font-size:12px;color:#555;margin-bottom:4px;line-height:1.4}
.tag{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;display:inline-block}
.tag-red{background:#fdecea;color:#9a2020}
.tag-amber{background:#fef3e2;color:#8a5a00}
.tag-green{background:#e0f5ec;color:#1a6640}
.tag-loc{background:#f0f0f0;color:#555}
.btn-followup{padding:7px 14px;border-radius:10px;border:none;background:#1a1a1a;color:#fff;font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0;-webkit-appearance:none}
.btn-followup:active{opacity:0.7}
.map-wrap{padding:0;height:calc(100vh - 110px)}
#map{width:100%;height:100%}
.city-panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:16px;max-height:60vh;overflow-y:auto;z-index:200;transform:translateY(100%);transition:transform 0.3s}
.city-panel.open{transform:translateY(0)}
.city-panel h2{font-size:16px;font-weight:600;margin-bottom:12px}
.city-contact{padding:10px 0;border-bottom:0.5px solid #eee;display:flex;gap:10px;align-items:flex-start}
.city-contact:last-child{border-bottom:none}
.pill{font-size:11px;padding:2px 8px;border-radius:99px;background:#e6f0fb;color:#1a4f8a;font-weight:500}
.empty-state{text-align:center;padding:40px 20px;color:#aaa;font-size:14px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px}
.stat{background:#fff;border-radius:12px;padding:10px;text-align:center}
.stat-n{font-size:20px;font-weight:600}
.stat-l{font-size:11px;color:#888;margin-top:2px}
.back-btn{font-size:13px;color:#1a1a1a;background:none;border:none;cursor:pointer;padding:0}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="window.location='/'">← Back</button>
  <h1>Network Tracker</h1>
  <div style="width:60px"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('tracker')">Follow-up</div>
  <div class="tab" onclick="switchTab('map')">Map</div>
</div>

<div id="tracker-pane" class="pane active">
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="st-overdue">0</div><div class="stat-l">Overdue</div></div>
    <div class="stat"><div class="stat-n" id="st-soon">0</div><div class="stat-l">Due soon</div></div>
    <div class="stat"><div class="stat-n" id="st-ok">0</div><div class="stat-l">Up to date</div></div>
  </div>
  <div id="tracker-list"><div class="empty-state">Loading...</div></div>
</div>

<div id="map-pane" class="pane">
  <div class="map-wrap">
    <div id="map"></div>
  </div>
</div>

<div class="city-panel" id="cityPanel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <h2 id="cityTitle"></h2>
    <button onclick="closePanel()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#888">✕</button>
  </div>
  <div id="cityContacts"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script>
let contacts = [];
let map = null;
let mapInit = false;

const CITY_COORDS = {
  'TORONTO': [43.65, -79.38], 'CALGARY': [51.05, -114.07], 'VANCOUVER': [49.28, -123.12],
  'NYC': [40.71, -74.01], 'MONTREAL': [45.50, -73.57], 'WINNIPEG': [49.90, -97.14],
  'EDMONTON': [53.55, -113.49], 'LONDON UK': [51.51, -0.13], 'LA': [34.05, -118.24],
  'MEXICO CITY': [19.43, -99.13], 'DENVER': [39.74, -104.98], 'BERLIN': [52.52, 13.40],
  'AUS': [-33.87, 151.21], 'HALIFAX': [44.65, -63.57], 'BOSTON': [42.36, -71.06],
  'ATLANTA': [33.75, -84.39], 'VAN': [49.28, -123.12], 'HOUSTON': [29.76, -95.37],
  'MIAMI': [25.77, -80.19], 'CHICAGO': [41.88, -87.63], 'SF': [37.77, -122.42],
  'PARIS': [48.86, 2.35], 'MADRID': [40.42, -3.70], 'AMSTERDAM': [52.37, 4.90]
};

const COLORS=[['#E6F1FB','#0C447C'],['#E1F5EE','#085041'],['#EEEDFE','#3C3489'],['#FAEEDA','#633806'],['#FAECE7','#712B13'],['#FBEAF0','#72243E']];
function avatarColor(n){const i=(n||'?').charCodeAt(0)%COLORS.length;return COLORS[i]}
function initials(n){const p=(n||'?').trim().split(' ');return p.length>1?p[0][0]+p[p.length-1][0]:(n||'??').slice(0,2).toUpperCase()}

function splitLocs(loc){
  if(!loc)return[];
  return loc.split(/[\/,]/).map(l=>l.trim().toUpperCase()).filter(Boolean);
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return Math.floor((Date.now() - d.getTime()) / (1000 * 60 * 60 * 24));
}

function urgency(c) {
  const days = daysSince(c.last_contacted || c.created_at);
  if (days === null) return 'none';
  if (days > 60) return 'red';
  if (days > 30) return 'amber';
  return 'green';
}

async function load() {
  const r = await fetch('/api/contacts');
  contacts = await r.json();
  renderTracker();
}

function renderTracker() {
  const overdue = contacts.filter(c => {
    const days = daysSince(c.last_contacted || c.created_at);
    return days > 60;
  });
  const soon = contacts.filter(c => {
    const days = daysSince(c.last_contacted || c.created_at);
    return days >= 30 && days <= 60;
  });
  const ok = contacts.filter(c => {
    const days = daysSince(c.last_contacted || c.created_at);
    return days < 30;
  });

  document.getElementById('st-overdue').textContent = overdue.length;
  document.getElementById('st-soon').textContent = soon.length;
  document.getElementById('st-ok').textContent = ok.length;

  let html = '';

  if (overdue.length) {
    html += `<div class="section-label">Overdue (60+ days)</div>`;
    html += overdue.sort((a,b) => daysSince(b.last_contacted||b.created_at) - daysSince(a.last_contacted||a.created_at)).map(c => cardHtml(c, 'red')).join('');
  }
  if (soon.length) {
    html += `<div class="section-label">Follow up soon (30-60 days)</div>`;
    html += soon.map(c => cardHtml(c, 'amber')).join('');
  }
  if (ok.length) {
    html += `<div class="section-label">Up to date</div>`;
    html += ok.map(c => cardHtml(c, 'green')).join('');
  }

  document.getElementById('tracker-list').innerHTML = html || '<div class="empty-state">No contacts yet</div>';
}

function cardHtml(c, status) {
  const [bg, fg] = avatarColor(c.name);
  const days = daysSince(c.last_contacted || c.created_at);
  const daysLabel = days === null ? 'Never' : days === 0 ? 'Today' : `${days}d ago`;
  const locs = splitLocs(c.location);
  const tagClass = status === 'red' ? 'tag-red' : status === 'amber' ? 'tag-amber' : 'tag-green';
  return `<div class="card">
    <div class="avatar" style="background:${bg};color:${fg}">${initials(c.name)}</div>
    <div class="card-body">
      <div class="card-name">${c.name}</div>
      <div class="card-sub">${c.contact||''}</div>
      ${c.next ? `<div class="card-note">Next: ${c.next}</div>` : ''}
      ${c.notes ? `<div class="card-note" style="color:#aaa;font-size:11px">${c.notes.slice(0,80)}${c.notes.length>80?'...':''}</div>` : ''}
      <div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px">
        <span class="tag ${tagClass}">${daysLabel}</span>
        ${locs.map(l=>`<span class="tag tag-loc">${l}</span>`).join('')}
      </div>
    </div>
    <button class="btn-followup" onclick="markFollowup(${c.id})">Done</button>
  </div>`;
}

async function markFollowup(id) {
  await fetch(`/api/contacts/${id}/followup`, { method: 'POST' });
  await load();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='tracker')||(i===1&&tab==='map')));
  document.getElementById('tracker-pane').classList.toggle('active', tab==='tracker');
  document.getElementById('map-pane').classList.toggle('active', tab==='map');
  if (tab === 'map' && !mapInit) initMap();
}

function initMap() {
  mapInit = true;
  map = L.map('map').setView([30, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 18
  }).addTo(map);

  const cityGroups = {};
  contacts.forEach(c => {
    splitLocs(c.location).forEach(loc => {
      const key = loc.toUpperCase();
      if (!cityGroups[key]) cityGroups[key] = [];
      cityGroups[key].push(c);
    });
  });

  Object.entries(cityGroups).forEach(([city, people]) => {
    const coords = CITY_COORDS[city];
    if (!coords) return;
    const highVal = people.filter(p => parseInt(p.value) >= 8).length;
    const color = highVal > 0 ? '#1a4f8a' : '#555';
    const marker = L.circleMarker(coords, {
      radius: Math.min(8 + people.length * 1.5, 22),
      fillColor: color,
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.85
    }).addTo(map);

    marker.bindTooltip(`<strong>${city}</strong><br>${people.length} contact${people.length>1?'s':''}`, { permanent: false, direction: 'top' });
    marker.on('click', () => openCityPanel(city, people));
  });
}

function openCityPanel(city, people) {
  document.getElementById('cityTitle').textContent = `${city} (${people.length})`;
  const sorted = [...people].sort((a,b) => (parseInt(b.value)||0) - (parseInt(a.value)||0));
  document.getElementById('cityContacts').innerHTML = sorted.map(c => {
    const [bg, fg] = avatarColor(c.name);
    const val = c.value ? `<span class="pill">${c.value}/10</span>` : '';
    return `<div class="city-contact">
      <div class="avatar" style="background:${bg};color:${fg};width:32px;height:32px;font-size:11px;flex-shrink:0">${initials(c.name)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px;margin-bottom:2px">${c.name} ${val}</div>
        <div style="font-size:12px;color:#888">${c.contact||''}</div>
        ${c.next ? `<div style="font-size:12px;color:#555;margin-top:2px">Next: ${c.next}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('cityPanel').classList.add('open');
}

function closePanel() {
  document.getElementById('cityPanel').classList.remove('open');
}

load();
</script>
</body>
</html>
