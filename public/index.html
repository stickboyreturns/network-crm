<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:15px;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:17px;font-weight:600}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;-webkit-appearance:none;border:1px solid #ddd;background:#fff;color:#1a1a1a}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-danger{color:#d0342c;border-color:#f5c2c0}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.stat{background:#fff;border-radius:12px;padding:10px;text-align:center}
.stat-n{font-size:20px;font-weight:600}
.stat-l{font-size:11px;color:#888;margin-top:2px}
.filters{padding:0 16px 12px;display:flex;flex-direction:column;gap:8px}
.filters input,.filters select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #e0e0e0;background:#fff;font-size:16px;color:#1a1a1a;-webkit-appearance:none;appearance:none}
.contact-list{padding:0 16px 100px;display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border-radius:14px;padding:14px;display:flex;gap:12px;align-items:flex-start}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-name{font-weight:600;font-size:15px;margin-bottom:3px}
.card-contact{font-size:12px;color:#888;margin-bottom:4px}
.card-notes{font-size:13px;color:#555;margin-bottom:4px;line-height:1.4}
.card-next{font-size:12px;color:#1a1a1a;margin-bottom:4px}
.card-next span{color:#999}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
.tag-yes{background:#e0f5ec;color:#1a6640}
.tag-no{background:#f0f0ec;color:#666}
.tag-loc{background:#f0f0f0;color:#555}
.tag-high{background:#e6f0fb;color:#1a4f8a}
.tag-med{background:#fef3e2;color:#8a5a00}
.tag-low{background:#fdecea;color:#9a2020}
.card-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.fabs{position:fixed;bottom:28px;right:20px;display:flex;flex-direction:column;align-items:flex-end;gap:10px;z-index:200}
.fab{width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;font-size:26px}
.fab-main{background:#1a1a1a;color:#fff}
.fab-scan{background:#fff;border:1px solid #e0e0e0;color:#1a1a1a;font-size:22px}
.modal-wrap{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.5);-webkit-overflow-scrolling:touch;overflow-y:auto}
.modal-wrap.open{display:block}
.modal-inner{min-height:100%;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 48px;width:100%;max-width:600px}
.modal-sheet h2{font-size:17px;font-weight:600;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.03em}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border-radius:10px;border:1px solid #e0e0e0;background:#fff;font-size:16px;color:#1a1a1a;-webkit-appearance:none;appearance:none;font-family:inherit}
.field textarea{resize:none;font-size:15px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sheet-actions{display:flex;gap:10px;margin-top:16px}
.sheet-actions .btn{flex:1;padding:13px;font-size:15px}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;z-index:600;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty{text-align:center;padding:40px 20px;color:#aaa;font-size:14px}
.sync-bar{margin:0 16px 10px;padding:10px 14px;border-radius:10px;font-size:13px;display:none;line-height:1.4}
.sync-ok{background:#e0f5ec;color:#1a6640;display:block}
.sync-err{background:#fdecea;color:#9a2020;display:block}
.sync-ing{background:#e6f0fb;color:#1a4f8a;display:block}
.scan-drop{border:2px dashed #e0e0e0;border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;background:#fafafa;margin-bottom:16px}
.scan-drop-icon{font-size:36px;margin-bottom:8px}
.scan-drop-text{font-size:14px;color:#888;line-height:1.5}
.scan-preview{width:100%;border-radius:10px;max-height:200px;object-fit:contain;margin-bottom:12px;display:none}
.scan-status{padding:12px;border-radius:10px;font-size:13px;text-align:center;display:none;line-height:1.5}
.scan-status.loading{background:#e6f0fb;color:#1a4f8a;display:block}
.scan-status.error{background:#fdecea;color:#9a2020;display:block}
</style>
</head>
<body>

<div class="topbar">
  <h1>Network</h1>
  <button class="btn btn-sm" onclick="confirmSyncAll()">Sync to Sheets</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">Total</div></div>
  <div class="stat"><div class="stat-n" id="sReached">0</div><div class="stat-l">Reached</div></div>
  <div class="stat"><div class="stat-n" id="sPending">0</div><div class="stat-l">Pending</div></div>
  <div class="stat"><div class="stat-n" id="sHigh">0</div><div class="stat-l">High value</div></div>
</div>

<div class="filters">
  <input id="search" placeholder="Search name, notes, contact..." oninput="render()">
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
    <select id="fLoc" onchange="render()"><option value="">All cities</option></select>
    <select id="fReached" onchange="render()">
      <option value="">All</option><option value="Y">Reached</option><option value="N">Pending</option>
    </select>
    <select id="fVal" onchange="render()">
      <option value="">Any</option><option value="high">8-10</option><option value="med">5-7</option><option value="low">1-4</option>
    </select>
  </div>
</div>

<div id="syncBar" class="sync-bar"></div>
<div id="list" class="contact-list"></div>
<div id="empty" class="empty" style="display:none">No contacts match.</div>

<div class="fabs">
  <button class="fab fab-scan" onclick="openScan()">📷</button>
  <button class="fab fab-main" onclick="openAdd()">+</button>
</div>

<!-- Add/Edit modal -->
<div class="modal-wrap" id="addModal">
  <div class="modal-inner"><div class="modal-sheet">
    <h2 id="modalTitle">Add contact</h2>
    <div class="row2">
      <div class="field"><label>Name</label><input id="fName" placeholder="Full name" autocomplete="off"></div>
      <div class="field"><label>Contact</label><input id="fContact" placeholder="Email, insta, text..." autocomplete="off"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Location</label><input id="fLocation" placeholder="Toronto, NYC..." autocomplete="off"></div>
      <div class="field"><label>Value (1-10)</label><input id="fValue" type="number" min="1" max="10" placeholder="7"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Next step</label><input id="fNext" placeholder="Get coffee..." autocomplete="off"></div>
      <div class="field"><label>Reached out?</label>
        <select id="fReachedOut"><option value="N">No — pending</option><option value="Y">Yes — done</option></select>
      </div>
    </div>
    <div class="field"><label>Notes</label><textarea id="fNotes" rows="3" placeholder="Context, relationship, how you met..."></textarea></div>
    <div class="sheet-actions">
      <button class="btn" onclick="closeAdd()">Cancel</button>
      <button class="btn btn-primary" onclick="saveContact()">Save contact</button>
    </div>
  </div></div>
</div>

<!-- Scan modal -->
<div class="modal-wrap" id="scanModal">
  <div class="modal-inner"><div class="modal-sheet">
    <h2>Scan photo or screenshot</h2>
    <p style="font-size:13px;color:#888;margin-bottom:16px;line-height:1.5">Upload a photo, business card, Instagram screenshot, or anything with contact info. Claude will read it and fill in the form.</p>
    <img id="scanPreview" class="scan-preview" src="" alt="preview">
    <div class="scan-drop" onclick="document.getElementById('scanFileInput').click()">
      <div class="scan-drop-icon">📎</div>
      <div class="scan-drop-text">Tap to choose a photo or screenshot<br><span style="font-size:12px">Camera, Photos, or Files</span></div>
    </div>
    <input type="file" id="scanFileInput" accept="image/*" style="display:none" onchange="handleScanFile(event)">
    <div class="scan-status" id="scanStatus"></div>
    <div class="sheet-actions">
      <button class="btn" onclick="closeScan()">Cancel</button>
      <button class="btn btn-primary" id="scanGoBtn" onclick="runScan()" style="display:none">Extract info</button>
    </div>
  </div></div>
</div>

<div class="toast" id="toast"></div>

function splitLocs(loc){if(!loc)return[];return loc.split(/[\/,]/).map(l=>l.trim().toUpperCase()).filter(Boolean)}
function allCities(){const set=new Set();contacts.forEach(c=>splitLocs(c.location).forEach(l=>set.add(l)));return[...set].sort()}
const COLORS=[['#E6F1FB','#0C447C'],['#E1F5EE','#085041'],['#EEEDFE','#3C3489'],['#FAEEDA','#633806'],['#FAECE7','#712B13'],['#FBEAF0','#72243E']];
function avatarColor(n){const i=(n||'?').charCodeAt(0)%COLORS.length;return COLORS[i]}
function initials(n){const p=(n||'?').trim().split(' ');return p.length>1?p[0][0]+p[p.length-1][0]:(n||'??').slice(0,2).toUpperCase()}
function valTag(v){if(!v)return'';const n=parseInt(v);if(n>=8)return`<span class="tag tag-high">${v}/10</span>`;if(n>=5)return`<span class="tag tag-med">${v}/10</span>`;return`<span class="tag tag-low">${v}/10</span>`}

function formatContact(raw){
  if(!raw)return'';
  const t=raw.trim();
  if(/^https?:\/\//i.test(t)){const display=t.replace(/^https?:\/\/(www\.)?/i,'').replace(/\/$/,'');return`<a href="${t}" target="_blank" style="color:#1a6640;text-decoration:none">${display}</a>`}
  if(/^[\w.-]+\.(com|ca|co|tv|mx|uk|film|agency|net|org|io|fm)(\/.*)?$/i.test(t)){return`<a href="https://${t}" target="_blank" style="color:#1a6640;text-decoration:none">${t}</a>`}
  if(/^@[\w.]+$/.test(t)){const handle=t.slice(1);return`<a href="https://instagram.com/${handle}" target="_blank" style="color:#c2410c;text-decoration:none">${t}</a>`}
  if(/instagram\.com\//i.test(t)){const match=t.match(/instagram\.com\/([^/?]+)/i);const handle=match?match[1]:t;return`<a href="${/^https?:\/\//i.test(t)?t:'https://'+t}" target="_blank" style="color:#c2410c;text-decoration:none">@${handle}</a>`}
  if(/^instagram$/i.test(t))return t;
  if(/^[\w.+-]+@[\w.-]+\.[a-z]{2,}$/i.test(t)){return`<a href="mailto:${t}" style="color:#1a4f8a;text-decoration:none">${t}</a>`}
  if(/linkedin\.com\//i.test(t)){return`<a href="${/^https?:\/\//i.test(t)?t:'https://'+t}" target="_blank" style="color:#1a4f8a;text-decoration:none">LinkedIn</a>`}
  return t;
}

async function load(){
  document.getElementById('list').innerHTML='<div style="text-align:center;padding:2rem;color:#888;font-size:14px">Loading...</div>';
  try{
    const r=await fetch('/api/contacts');
    if(!r.ok)throw new Error('bad response');
    contacts=await r.json();
  }catch(e){
    console.error('DB load failed, using seed',e);
    contacts=[...SEED];
  }
  populateLoc();render();updateStats();
}
async function saveLocal(){updateStats();}
function populateLoc(){const cities=allCities();const sel=document.getElementById('fLoc');sel.innerHTML='<option value="">All cities</option>'+cities.map(c=>`<option value="${c}">${c}</option>`).join('')}
function updateStats(){document.getElementById('sTotal').textContent=contacts.length;document.getElementById('sReached').textContent=contacts.filter(c=>c.reached==='Y').length;document.getElementById('sPending').textContent=contacts.filter(c=>c.reached==='N').length;document.getElementById('sHigh').textContent=contacts.filter(c=>parseInt(c.value)>=8).length}

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const loc=document.getElementById('fLoc').value;
  const reached=document.getElementById('fReached').value;
  const val=document.getElementById('fVal').value;
  let list=contacts.filter(c=>{
    if(q&&![(c.name||''),(c.notes||''),(c.contact||''),(c.next||'')].some(x=>x.toLowerCase().includes(q)))return false;
    if(loc&&!splitLocs(c.location).includes(loc.toUpperCase()))return false;
    if(reached&&c.reached!==reached)return false;
    if(val){const n=parseInt(c.value)||0;if(val==='high'&&n<8)return false;if(val==='med'&&(n<5||n>7))return false;if(val==='low'&&n>4)return false}
    return true;
  });
  const el=document.getElementById('list');
  document.getElementById('empty').style.display=list.length?'none':'block';
  el.innerHTML=list.map(c=>{
    const ri=contacts.indexOf(c);
    const[bg,fg]=avatarColor(c.name);
    const locs=splitLocs(c.location);
    return`<div class="card">
      <div class="avatar" style="background:${bg};color:${fg}">${initials(c.name)}</div>
      <div class="card-body">
        <div class="card-name">${c.name||''}</div>
        <div class="card-contact">${formatContact(c.contact)}</div>
        ${c.notes?`<div class="card-notes">${c.notes}</div>`:''}
        ${c.next?`<div class="card-next"><span>Next: </span>${c.next}</div>`:''}
        <div class="tags">
          <span class="tag ${c.reached==='Y'?'tag-yes':'tag-no'}">${c.reached==='Y'?'Reached out':'Pending'}</span>
          ${valTag(c.value)}
          ${locs.map(l=>`<span class="tag tag-loc">${l}</span>`).join('')}
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-sm" onclick="openEdit(${ri})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="del(${ri})">Del</button>
      </div>
    </div>`;
  }).join('');
}

function openAdd(){editIdx=null;document.getElementById('modalTitle').textContent='Add contact';['fName','fContact','fLocation','fValue','fNext','fNotes'].forEach(id=>document.getElementById(id).value='');document.getElementById('fReachedOut').value='N';document.getElementById('addModal').classList.add('open');document.body.style.overflow='hidden'}
function closeAdd(){document.getElementById('addModal').classList.remove('open');document.body.style.overflow=''}
function openEdit(i){
  editIdx=i;const c=contacts[i];
  document.getElementById('modalTitle').textContent='Edit contact';
  document.getElementById('fName').value=c.name||'';document.getElementById('fContact').value=c.contact||'';document.getElementById('fLocation').value=c.location||'';document.getElementById('fValue').value=c.value||'';document.getElementById('fNext').value=c.next||'';document.getElementById('fNotes').value=c.notes||'';document.getElementById('fReachedOut').value=c.reached||'N';
  document.getElementById('addModal').classList.add('open');document.body.style.overflow='hidden';
}
async function saveContact(){
  const c={name:document.getElementById('fName').value.trim(),contact:document.getElementById('fContact').value.trim(),location:document.getElementById('fLocation').value.trim().toUpperCase(),value:document.getElementById('fValue').value.trim(),next:document.getElementById('fNext').value.trim(),notes:document.getElementById('fNotes').value.trim(),reached:document.getElementById('fReachedOut').value};
  if(!c.name){toast('Name is required');return}
  try{
    if(editIdx!==null){
      const id=contacts[editIdx].id;
      await fetch('/api/contacts/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)});
    }else{
      const r=await fetch('/api/contacts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)});
      const data=await r.json();
      c.id=data.contact.id;
    }
    closeAdd();toast('Saved');await load();syncOne(c);
  }catch(e){toast('Save failed');}
}
async function del(i){
  if(!confirm('Delete '+contacts[i].name+'?'))return;
  const id=contacts[i].id;
  await fetch('/api/contacts/'+id,{method:'DELETE'});
  await load();
}

function openScan(){scanImageBase64=null;scanImageType=null;document.getElementById('scanPreview').style.display='none';document.getElementById('scanPreview').src='';document.getElementById('scanStatus').className='scan-status';document.getElementById('scanStatus').textContent='';document.getElementById('scanGoBtn').style.display='none';document.getElementById('scanFileInput').value='';document.getElementById('scanModal').classList.add('open');document.body.style.overflow='hidden'}
function closeScan(){document.getElementById('scanModal').classList.remove('open');document.body.style.overflow=''}

function handleScanFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const result=ev.target.result;
    const preview=document.getElementById('scanPreview');preview.src=result;preview.style.display='block';
    const parts=result.split(',');scanImageBase64=parts[1];scanImageType=file.type||'image/jpeg';
    document.getElementById('scanGoBtn').style.display='flex';
    document.getElementById('scanStatus').className='scan-status';
  };
  reader.readAsDataURL(file);
}

async function runScan(){
  if(!scanImageBase64){toast('No image selected');return}
  const status=document.getElementById('scanStatus');
  status.textContent='Reading image with Claude...';status.className='scan-status loading';
  document.getElementById('scanGoBtn').disabled=true;
  try{
    const response=await fetch('/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:scanImageBase64,imageType:scanImageType})});
    const data=await response.json();
    if(!data.ok)throw new Error(data.error||'Failed');
    const extracted=data.contact;
    closeScan();
    editIdx=null;
    document.getElementById('modalTitle').textContent='Review & save contact';
    document.getElementById('fName').value=extracted.name||'';document.getElementById('fContact').value=extracted.contact||'';document.getElementById('fLocation').value=extracted.location||'';document.getElementById('fValue').value=extracted.value||'';document.getElementById('fNext').value=extracted.next||'';document.getElementById('fNotes').value=extracted.notes||'';document.getElementById('fReachedOut').value=extracted.reached||'N';
    document.getElementById('addModal').classList.add('open');document.body.style.overflow='hidden';
    toast('Info extracted — review and save');
  }catch(err){
    status.textContent='Could not read image. Try a clearer photo or fill in manually.';status.className='scan-status error';document.getElementById('scanGoBtn').disabled=false;
  }
}

async function confirmSyncAll(){if(!confirm('Push all '+contacts.length+' contacts to Google Sheets?'))return;syncAll()}
async function syncOne(c){try{await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'append',sheet:SHEET_NAME,row:[c.name,c.contact,c.reached,c.notes,c.value,c.next,c.location]})})}catch(e){}}
async function syncAll(){
  const bar=document.getElementById('syncBar');bar.textContent='Syncing '+contacts.length+' contacts...';bar.className='sync-bar sync-ing';
  try{await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'syncAll',sheet:SHEET_NAME,contacts:contacts})});bar.textContent='Done — '+contacts.length+' contacts synced';bar.className='sync-bar sync-ok';setTimeout(()=>{bar.className='sync-bar'},5000)}
  catch(e){bar.textContent='Sync failed';bar.className='sync-bar sync-err'}
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeAdd()});
document.getElementById('scanModal').addEventListener('click',function(e){if(e.target===this)closeScan()});
load();
</script>
</body>
